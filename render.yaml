services:
  - type: web
    name: telegram-kinescope-bot
    runtime: python
    plan: free
    buildCommand: |
      echo "🚀 Начинаем сборку..."
      
      # Создаем папку для бинарников
      mkdir -p bin
      
      # Установка FFmpeg
      echo "📥 Устанавливаем FFmpeg..."
      apt-get update
      apt-get install -y ffmpeg wget unzip tar
      
      # Скачивание mp4decrypt
      echo "📥 Скачиваем mp4decrypt..."
      wget -O bento4.zip https://github.com/axiomatic-systems/Bento4/releases/download/1.6.0-641/Bento4-SDK-1-6-0-641.x86_64-unknown-linux.zip
      unzip -j bento4.zip "*/mp4decrypt" -d bin/
      chmod +x bin/mp4decrypt
      
      # Скачивание N_m3u8DL-RE
      echo "📥 Скачиваем N_m3u8DL-RE..."
      wget -O n_m3u8dl.tar.gz https://github.com/nilaoda/N_m3u8DL-RE/releases/download/v0.2.0-beta/N_m3u8DL-RE_Beta_linux-x64_20230418.tar.gz
      tar -xzf n_m3u8dl.tar.gz
      cp N_m3u8DL-RE bin/
      chmod +x bin/N_m3u8DL-RE
      
      # Очистка
      rm -f bento4.zip n_m3u8dl.tar.gz
      
      # Установка Python зависимостей
      echo "📦 Устанавливаем Python пакеты..."
      pip install -r requirements.txt
      
      echo "✅ Сборка завершена!"
      
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false