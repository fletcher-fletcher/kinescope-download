services:
  - type: web
    name: telegram-kinescope-bot
    runtime: python
    plan: free
    buildCommand: |
      echo "🚀 Начинаем сборку..."
      
      # Проверяем наличие бинарников в репозитории
      echo "📋 Проверка бинарников:"
      ls -la bin/ || echo "Папка bin не найдена"
      
      # Делаем бинарники исполняемыми
      chmod +x bin/* 2>/dev/null || true
      
      # Устанавливаем FFmpeg из системы (на всякий случай)
      echo "📥 Устанавливаем FFmpeg..."
      apt-get update
      apt-get install -y ffmpeg
      
      # Установка Python зависимостей
      echo "📦 Устанавливаем Python пакеты..."
      pip install -r requirements.txt
      
      echo "✅ Сборка завершена!"
      
    startCommand: python bot.py
    envVars:
      - key: BOT_TOKEN
        sync: false
